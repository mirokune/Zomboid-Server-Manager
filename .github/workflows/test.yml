name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest   # backend tests have no Windows-specific logic
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest test_backend.py -v
        env:
          QT_QPA_PLATFORM: offscreen   # required for headless Qt (test_gui.py when added)
